<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe Website</title>

    <link rel="stylesheet" href="css/bootstrapV4.css">
    <link rel="stylesheet" href="css/font-awesome.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div id="page">

    <!-- Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand font-weight-bold" href="index.html">Recipe World</a>

                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active">
                            <a class="nav-link" href="login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Login Section -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="search-box p-4 shadow-sm rounded bg-white">
                        <div class="text-center mb-4">
                            <h2 class="font-weight-bold text-dark">Login</h2>
                            <p class="text-muted mb-0">Enter your username and password</p>
                        </div>

                        <form id="loginForm">
                            <div class="form-group">
                                <label for="username" class="font-weight-bold text-dark">Username</label>
                                <input type="text" id="username" class="form-control form-control-lg" placeholder="Enter username">
                            </div>

                            <div class="form-group">
                                <label for="password" class="font-weight-bold text-dark">Password</label>
                                <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter password">
                            </div>

                            <div id="errorMsg" class="text-danger text-center mb-3" style="display:none;"></div>
                            <div id="successMsg" class="text-success text-center mb-3" style="display:none;"></div>

                            <button id="loginBtn" type="submit" class="btn btn-warning btn-block btn-lg">Login</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-0">© 2026 Recipe World. All rights reserved.</p>
        </div>
    </footer>

</div>
<script src="js/jquery.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrapV4.js"></script>
<script src="js/main.js"></script>
</body>
</html>
